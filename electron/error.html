<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ContentAI Studio — Hata</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #09090b; color: #f4f4f5;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100vh; gap: 12px;
    -webkit-app-region: drag;
  }
  h1 { font-size: 18px; color: #f87171; }
  p { color: #71717a; font-size: 13px; text-align: center; max-width: 360px; line-height: 1.6; }
  button {
    margin-top: 8px; padding: 8px 20px; border-radius: 8px;
    background: #8b5cf6; color: white; border: none;
    font-size: 13px; cursor: pointer; -webkit-app-region: no-drag;
  }
  button:hover { background: #7c3aed; }
</style>
</head>
<body>
  <h1>Sunucu başlatılamadı</h1>
  <p>Next.js sunucusu 30 saniye içinde yanıt vermedi. Uygulamayı yeniden başlatmayı dene.</p>
  <button onclick="location.reload()">Yeniden Dene</button>
</body>
</html>
